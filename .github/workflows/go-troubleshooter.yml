name: Go Troubleshooter CI

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - ".github/workflows/go-troubleshooter.yml"
      - "examples/troubleshooting/**"
      - "README.md"
      - "README_ZH.md"
      - "分析.md"
  pull_request:
    branches: [ master, main ]
    paths:
      - ".github/workflows/go-troubleshooter.yml"
      - "examples/troubleshooting/**"
      - "README.md"
      - "README_ZH.md"
      - "分析.md"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: examples/troubleshooting/go_walker/go.mod
          cache-dependency-path: |
            examples/troubleshooting/go_walker/go.sum

      - name: Test go_walker
        working-directory: examples/troubleshooting/go_walker
        run: go test ./...

      - name: Test executor_unit
        working-directory: examples/troubleshooting/executor_unit
        run: go test ./...

      - name: Build Linux binary
        run: |
          mkdir -p dist
          cd examples/troubleshooting/go_walker
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o ../../../dist/treesearch-go-troubleshooter-linux-amd64

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: treesearch-go-troubleshooter-linux-amd64
          path: dist/treesearch-go-troubleshooter-linux-amd64
